name: Comment
table: comments
description: Comment entity

fields:
  - name: ID
    type: int64
    json: id
    db: id
    primary_key: true
    auto_increment: true
    
  - name: Text
    type: string
    json: title
    db: title
    required: true
    request : true
    validation: "min=1,max=200"
    
  - name: Status
    type: string
    json: status
    db: status
    request : true
    default: "draft"
    validation: "oneof=draft published archived"
    
  - name: PublishedAt
    type: "*time.Time"
    json: published_at,omitempty
    db: published_at
    request : true
    
  - name: CreatedAt
    type: time.Time
    json: created_at
    db: created_at
    
  - name: UpdatedAt
    type: time.Time
    json: updated_at
    db: updated_at

indexes:

relationships:
  - type: belongs_to
    model: User
    foreign_key: author_id
    references: ID