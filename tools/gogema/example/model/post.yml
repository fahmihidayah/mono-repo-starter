name: Post
table: posts
description: "Entity representing blog posts or articles"

fields:
  - name: ID
    type: uint        # Konsisten dengan Category & Task sebelumnya (uint lebih efisien untuk PK)
    json: id
    db: id
    primary_key: true
    auto_increment: true
    
  - name: Title
    type: string
    json: title
    db: title
    length: 200
    required: true
    request : true
    validation: "required,min=5,max=200"
    
  - name: Slug
    type: string
    json: slug
    db: slug
    length: 200
    required: true
    request : true
    unique: true      # GORM akan otomatis membuat unique index
    validation: "required,alphanumhyphen" # Custom validation untuk slug
    
  - name: Content
    type: string
    json: content
    db: content
    type_override: text # Penting: Agar di DB menjadi TEXT, bukan VARCHAR(255)
    required: true
    request : true
    
  - name: Excerpt
    type: string
    json: excerpt
    db: excerpt
    length: 500
    nullable: true    # Gunakan flag ini daripada "*string" agar generator lebih fleksibel
    request : true

  - name: AuthorID
    type: uint
    json: author_id
    db: author_id
    required: true
    
  - name: CategoryID #  TODO : bisa lebih dari satu
    type: uint
    json: category_id
    db: category_id
    nullable: true    # Memungkinkan Post tanpa kategori (Uncategorized)
    request : true

  - name: Status
    type: string
    json: status
    db: status
    length: 20
    default: "draft"
    index: true       # Index tunggal karena sering difilter (misal: "tampilkan semua draft")
    validation: "oneof=draft published archived"
    request : true
    
  - name: ViewCount
    type: int
    json: view_count
    db: view_count
    default: 0
    
  - name: PublishedAt
    type: time.Time
    json: published_at
    db: published_at
    nullable: true    # Akan menjadi *time.Time di Go
    
  - name: CreatedAt
    type: time.Time
    json: created_at
    db: created_at
    auto_now_add: true

  - name: UpdatedAt
    type: time.Time
    json: updated_at
    db: updated_at
    auto_now: true

# Indexing strategis untuk performa query
indexes:
  - name: idx_posts_author_status
    columns: [author_id, status] # Composite index untuk dashboard author
    
  - name: idx_posts_published_status
    columns: [status, published_at] # Penting untuk query: "tampilkan artikel publish terbaru"

relationships:
  - name: Author
    type: belongs_to
    model: User
    foreign_key: author_id
    on_delete: "CASCADE"
    
  - name: Category
    type: belongs_to
    model: Category
    foreign_key: category_id
    on_delete: "SET NULL" # Jika kategori dihapus, post tidak hilang tapi jadi NULL