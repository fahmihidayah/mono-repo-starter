name: Task
table: tasks
description: "Task entity representing individual work items"

fields:
  - name: ID
    type: uint
    json: id
    db: id
    primary_key: true
    auto_increment: true

  - name: Title
    type: string
    json: title
    db: title
    length: 200
    required: true
    request : true
    validation: "required,min=3,max=200"

  - name: Content
    type: string
    json: content
    db: content
    type_override: text # Menggunakan TEXT karena konten bisa sangat panjang
    nullable: true
    request : true

  - name: Status
    type: string
    json: status
    db: status
    length: 20:
    default: "pending" # Nilai default di level DB
    validation: "oneof=pending doing done"
    request : true

  - name: Priority
    type: int
    json: priority
    db: priority
    default: 1 # 1: Low, 2: Medium, 3: High
    validation: "min=1,max=3"
    request : true

  - name: DueDate
    type: time.Time
    json: due_date
    db: due_date
    nullable: true
    request : true

  - name: CategoryID
    type: uint
    json: category_id
    db: category_id
    required: true
    request : true

  - name: CreatedAt
    type: time.Time
    json: created_at
    db: created_at
    auto_now_add: true

  - name: UpdatedAt
    type: time.Time
    json: updated_at
    db: updated_at
    auto_now: true

indexes:
  - name: idx_tasks_status
    columns: [status]
  - name: idx_tasks_category_id
    columns: [category_id]
  - name: idx_tasks_due_date
    columns: [due_date]

relationships:
  - name: Category
    type: belongs_to
    model: Category
    foreign_key: category_id
    references: id
    on_delete: "CASCADE"
    on_update: "CASCADE"