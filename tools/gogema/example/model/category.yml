name : Category
table : categories
description : Category entity

fields : 
  - name : ID
    type : int64
    json : id
    db : id
    primary_key : true
    auto_increment : true
  
  - name : Name
    type : string
    json : name
    db : name
    required : true
    request : true
    unique : true
    validation : min=1,max=200

  - name : Description
    type : string
    json : description
    db : description
    required : true
    request : true
    validation : min=1,max=200

  - name : CreatedAt
    type : time.Time
    json : created_at
    db : created_at
    auto_now_add : true

  - name : UpdatedAt
    type : time.Time
    json : updated_at
    db : updated_at
    auto_now : true

indexes : 
  - name : idx_name
    columns : 
      - name : name

relationships : 
  - name : tasks
    type : has_many
    model : Task
    foreign_key : category_id
    
