name: User
table: users
description: "Core user entity with authentication and security fields"

fields:
  - name: ID
    type: string
    json: id
    db: id
    primary_key: true
    length: 36        # Panjang standar UUID
    # Gunakan UUID v4 untuk keamanan (agar ID tidak tertebak/sequential)

  - name: Name
    type: string
    json: name
    db: name
    length: 100
    required: true
    request : true
    validation: "required,min=2,max=100"

  - name: Email
    type: string
    json: email
    db: email
    length: 150
    required: true
    request : true
    unique: true
    validation: "required,email"

  # --- Security & Auth Fields ---
  - name: HashedPassword
    type: string
    json: "-"         # Sembunyikan dari JSON
    db: hashed_password
    type_override: text
    required: true

  - name: HashSalt
    type: string
    json: "-"
    db: hash_salt
    length: 255

  - name: HashIterations
    type: int
    json: "-"
    db: hash_iterations
    default: 10000

  # --- Account Status & Security ---
  - name: LoginAttempts
    type: int
    json: "-"
    db: login_attempts
    default: 0

  - name: LockUntil
    type: time.Time    # Ubah ke time.Time agar konsisten dengan field waktu lainnya
    json: "-"
    db: lock_until
    nullable: true

  - name: IsSuperUser
    type: bool
    json: is_super_user
    db: is_super_user
    default: false

  - name: IsVerified
    type: bool
    json: is_verified
    db: is_verified
    default: false
    index: true       # Indexing penting untuk query filter user aktif

  # --- Token & Verification Group ---
  # Menggunakan struct grouping di Go nanti akan lebih rapi
  - name: ResetPasswordToken
    type: string
    json: "-"
    db: reset_password_token
    length: 255
    nullable: true
    index: true

  - name: ResetPasswordExpiry
    type: time.Time
    json: "-"
    db: reset_password_expiry
    nullable: true

  - name: VerificationCode
    type: string
    json: "-"
    db: verification_code
    length: 100
    nullable: true

  - name: VerificationKind
    type: string
    json: "-"
    db: verification_kind
    length: 50
    nullable: true

  # --- Timestamps ---
  - name: CreatedAt
    type: time.Time
    json: created_at
    db: created_at
    auto_now_add: true

  - name: UpdatedAt
    type: time.Time
    json: updated_at
    db: updated_at
    auto_now: true

indexes:
  - name: idx_users_email_verified
    columns: [email, is_verified] # Composite index untuk login query tercepat
  - name: idx_users_auth_lookup
    columns: [reset_password_token]

relationships:
  - name: Posts
    type: has_many
    model: Post
    foreign_key: author_id